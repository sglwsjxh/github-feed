name: Star Feed Update

on:
  schedule:
    - cron: "15 8 * * *"
      timezone: Asia/Shanghai
  workflow_dispatch:

jobs:
  update-star-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.FEED_GITHUB_TOKEN }}

      - name: Fetch starred repos release info
        id: fetch_data
        env:
          GH_TOKEN: ${{ secrets.FEED_GITHUB_TOKEN }}
        run: |
          echo "📦 获取 starred 仓库列表..."

          # 一次 API 调用获取完整信息（名称、描述、URL、语言、Star数、推送时间）
          STARRED_JSON=$(gh api "/user/starred?per_page=100" \
            --jq '[.[] | {name: .full_name, description: (.description // ""), url: .html_url, lang: (.language // ""), stars: .stargazers_count, pushed: .pushed_at}]' \
            2>/dev/null || echo "[]")

          STAR_COUNT=$(echo "$STARRED_JSON" | jq 'length')
          if [ "$STAR_COUNT" -eq 0 ] 2>/dev/null; then
            echo "⚠️ 无法获取 starred 列表，检查 PAT 权限"
            exit 1
          fi
          echo "✅ 共获取 $STAR_COUNT 个 starred 仓库"

          # 从完整 JSON 中提取 name 列表用于查 release
          STARRED=$(echo "$STARRED_JSON" | jq -r '.[].name' 2>/dev/null || echo "")

          SINCE=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
                  || date -u -v-7d +%Y-%m-%dT%H:%M:%SZ)

          RELEASES_JSON="[]"
          COUNT=0

          while IFS= read -r REPO; do
            [ -z "$REPO" ] && continue
            RELEASE=$(gh api "repos/$REPO/releases/latest" \
              --jq '{repo: $repo, tag: .tag_name, name: .name, published: .published_at, url: .html_url, body: (.body // "")}' \
              --arg repo "$REPO" 2>/dev/null || echo "null")

            if [ "$RELEASE" != "null" ] && [ -n "$RELEASE" ]; then
              PUB=$(echo "$RELEASE" | jq -r '.published // ""')
              if [ -n "$PUB" ] && [[ "$PUB" > "$SINCE" ]]; then
                RELEASES_JSON=$(echo "$RELEASES_JSON" | jq --argjson r "$RELEASE" '. + [$r]')
                COUNT=$((COUNT + 1))
              fi
            fi
          done <<< "$STARRED"

          echo "✅ 找到 $COUNT 个近7天有新版本的 starred 仓库"
          RELEASES_JSON=$(echo "$RELEASES_JSON" | jq 'sort_by(.published) | reverse' 2>/dev/null || echo "[]")

          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "today=$(date '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "update_time=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

          echo "starred<<EOF_STARRED" >> $GITHUB_OUTPUT
          echo "$STARRED_JSON" >> $GITHUB_OUTPUT
          echo "EOF_STARRED" >> $GITHUB_OUTPUT

          echo "releases<<EOF_RELEASES" >> $GITHUB_OUTPUT
          echo "$RELEASES_JSON" >> $GITHUB_OUTPUT
          echo "EOF_RELEASES" >> $GITHUB_OUTPUT

      - name: Generate feed
        id: ai_feed
        uses: actions/ai-inference@v1
        with:
          endpoint: https://integrate.api.nvidia.com/v1
          token: ${{ secrets.NVIDIA_API_KEY }}
          model: z-ai/glm-5.1
          max-tokens: 131072
          system-prompt: |
            你是一个 GitHub Star 项目动态播报助手
            输出将直接嵌入 GitHub README.md，必须是标准 Markdown 格式
            语言：中文。风格：简洁但信息密度高，类似 GitHub 首页 Feed
            将英文内容翻译为中文
            不要输出任何额外的解释、代码块包围或 Markdown 包裹，只输出纯 Markdown 内容本身
            不要输出 `<!-- FEED -->` 或 `<!-- /FEED -->` 标记
          prompt: |
            今天是 ${{ steps.fetch_data.outputs.today }}，

            以下是我所有 GitHub starred 仓库的完整列表（JSON 格式，含名称、描述、语言、Star数、最后推送时间等）：

            ${{ steps.fetch_data.outputs.starred }}

            以下是近7天有 Release 版本更新的项目列表（可能为空）：

            ${{ steps.fetch_data.outputs.releases }}

            请根据以上数据，直接生成一份 Star 项目动态播报。
            具体要求：
            - **如果有 release 数据**：以 release 更新为主进行播报，逐条列出 release body 中的要点
            - **如果 release 列表为空**：不要只说"无更新"。请根据完整仓库列表，推荐一些近期活跃的、高 Star 的、或者描述中有趣的优质项目，让读者有内容可看
            - 整体风格类似 GitHub Feed，简洁有信息量
            - 格式由你自己决定，自由发挥，不要拘泥于固定模板
            - 使用中文
            直接输出纯 Markdown。

      - name: Update README.md
        run: |
          python3 - <<'PYEOF'
          import re, os

          readme_path = "README.md"
          response_file = os.environ.get("RESPONSE_FILE", "")
          today = os.environ.get("TODAY", "")

          if response_file and os.path.exists(response_file):
              with open(response_file, "r", encoding="utf-8") as f:
                  ai_output = f.read()
          else:
              ai_output = "*(AI 未返回内容)*"

          with open(readme_path, "r", encoding="utf-8") as f:
              content = f.read()

          update_time = os.environ.get("UPDATE_TIME", today)
          content = re.sub(
              r'\*\*[^*]*\*\*\n\n<!-- FEED -->',
              f'**更新于 {update_time}**\n\n<!-- FEED -->',
              content
          )

          content = re.sub(
              r"<!-- FEED -->\n.*?\n<!-- /FEED -->",
              f"<!-- FEED -->\n{ai_output.strip()}\n<!-- /FEED -->",
              content,
              flags=re.DOTALL
          )

          with open(readme_path, "w", encoding="utf-8") as f:
              f.write(content)

          print("✅ README.md 已更新")
          PYEOF
        env:
          RESPONSE_FILE: ${{ steps.ai_feed.outputs.response-file }}
          TODAY: ${{ steps.fetch_data.outputs.today }}
          UPDATE_TIME: ${{ steps.fetch_data.outputs.update_time }}

      - name: Commit and push README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md

          if git diff --staged --quiet; then
            echo "ℹ️ README 无变化，跳过 commit"
          else
            git commit -m "⭐ Star Feed 更新 - ${{ steps.fetch_data.outputs.today }}"
            git push
            echo "✅ 已推送更新"
          fi
