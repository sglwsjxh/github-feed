name: Star Feed Update

on:
  schedule:
    - cron: "15 8 * * *"
      timezone: Asia/Shanghai
  workflow_dispatch:

jobs:
  update-star-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.FEED_GITHUB_TOKEN }}

      - name: Fetch starred repos
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.FEED_GITHUB_TOKEN }}
        run: |
          python scripts/fetch_repos.py > starred_data.json

          COUNT=$(jq -r '.count // 0' starred_data.json)
          echo "📦 starred 仓库：$COUNT 个"

          # 导出关键字段给后续步骤
          echo "date=$(jq -r '.date' starred_data.json)" >> $GITHUB_OUTPUT
          echo "fetch_time=$(jq -r '.fetch_time' starred_data.json)" >> $GITHUB_OUTPUT
          echo "starred_data=$(jq -c '{count, repos}' starred_data.json)" >> $GITHUB_OUTPUT

      - name: Generate feed via AI
        id: ai_feed
        uses: actions/ai-inference@v1
        with:
          endpoint: https://integrate.api.nvidia.com/v1
          token: ${{ secrets.NVIDIA_API_KEY }}
          model: z-ai/glm-5.1
          max-tokens: 131072
          system-prompt: |
            你是 GitHub 仓库动态分析助手。

            用户会提供他的 GitHub starred 仓库列表（JSON 格式）。

            你的任务是：
            1. 分析哪些仓库是近期活跃的（pushed_at 在近 7 天内）
            2. 为每个活跃仓库生成一条更新记录
            3. 只输出纯 JSON，不含任何 Markdown 包裹或额外说明

            输出时必须严格遵守下面的 JSON 结构，字段名不可更改：
          prompt: |
            当前日期已包含在下面的 starred 数据中。

            以下是我的 GitHub starred 仓库列表：
            ${{ steps.fetch.outputs.starred_data }}

            请输出以下 JSON 格式（严格遵循，只输出 JSON，不要代码块包裹）：

            {
              "date": "2026-06-25",
              "items": [
                {
                  "repo": "owner/repo",
                  "url": "https://github.com/owner/repo",
                  "tag": "v1.2.3 或主语言标签",
                  "release_url": "https://github.com/owner/repo",
                  "release_date": "YYYY-MM-DD",
                  "changes": ["更新说明1", "更新说明2"]
                }
              ]
            }

            要求：
            - 只包含 pushed_at 在近 7 天内的仓库
            - tag：有版本号标签写版本号，否则写仓库主语言（如 Python、TypeScript）
            - release_url：尽量用仓库 URL（因为不确定是否有真实 Release）
            - release_date：用 pushed_at 日期部分（YYYY-MM-DD）
            - changes：根据仓库 description 和活跃情况生成 1-3 条合理的中文更新说明。每条不超过 50 字
            - 按 release_date 从最新到最旧排序
            - 如果近 7 天没有活跃仓库，items 为空数组
            - 只输出纯 JSON，不要 markdown 包裹、不要额外说明

      - name: Update README.md
        run: python scripts/update_readme.py
        env:
          AI_OUTPUT_FILE: ${{ steps.ai_feed.outputs.response-file }}
          UPDATE_TIME: ${{ steps.fetch.outputs.fetch_time }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md

          if git diff --staged --quiet; then
            echo "ℹ️ README 无变化，跳过 commit"
          else
            git commit -m "⭐ Star Feed 更新 - $(TZ='Asia/Shanghai' date '+%Y-%m-%d')"
            git pull --rebase origin main
            git push
            echo "✅ 已推送更新"
          fi
