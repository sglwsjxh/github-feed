name: Star Feed Update

on:
  schedule:
    - cron: "15 8 * * *"
      timezone: Asia/Shanghai
  workflow_dispatch:

jobs:
  update-star-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.FEED_GITHUB_TOKEN }}

      - name: Fetch starred repos release info
        id: fetch_data
        env:
          GH_TOKEN: ${{ secrets.FEED_GITHUB_TOKEN }}
        run: |
          echo "📦 获取 starred 仓库列表..."

          STARRED=$(gh api "/user/starred?per_page=100" \
            --jq '.[].full_name' 2>/dev/null || echo "")

          if [ -z "$STARRED" ]; then
            echo "⚠️ 无法获取 starred 列表，检查 PAT 权限"
            exit 1
          fi

          SINCE=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
                  || date -u -v-7d +%Y-%m-%dT%H:%M:%SZ)

          RELEASES_JSON="[]"
          COUNT=0

          while IFS= read -r REPO; do
            RELEASE=$(gh api "repos/$REPO/releases/latest" 2>/dev/null \
              --jq "{
                repo: \"$REPO\",
                tag: .tag_name,
                name: .name,
                published: .published_at,
                url: .html_url,
                body: (.body // "")
              }" 2>/dev/null || echo "null")

            if [ "$RELEASE" != "null" ] && [ -n "$RELEASE" ]; then
              PUB=$(echo "$RELEASE" | jq -r '.published // ""')
              if [[ "$PUB" > "$SINCE" ]]; then
                RELEASES_JSON=$(echo "$RELEASES_JSON" | jq --argjson r "$RELEASE" '. + [$r]')
                COUNT=$((COUNT + 1))
              fi
            fi
          done <<< "$STARRED"

          echo "✅ 找到 $COUNT 个近7天有新版本的 starred 仓库"

          # 按发布时间从新到旧排序
          RELEASES_JSON=$(echo "$RELEASES_JSON" | jq 'sort_by(.published) | reverse')

          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "today=$(date '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "update_time=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

          echo "releases<<EOF_RELEASES" >> $GITHUB_OUTPUT
          echo "$RELEASES_JSON" >> $GITHUB_OUTPUT
          echo "EOF_RELEASES" >> $GITHUB_OUTPUT

      - name: Generate feed
        id: ai_feed
        uses: actions/ai-inference@v1
        with:
          endpoint: https://integrate.api.nvidia.com/v1
          token: ${{ secrets.NVIDIA_API_KEY }}
          model: z-ai/glm-5.1
          max-tokens: 131072
          system-prompt: |
            你是一个 GitHub 项目动态播报助手
            输出将直接嵌入 GitHub README.md，必须是标准 Markdown 格式
            语言：中文。风格：简洁但信息密度高，类似 GitHub 首页 Feed
            对每个项目逐条列出 release body 中的每个要点，不要合并压缩
            将 release body 中的所有英文内容翻译为中文
            每句话末尾不要加句号，用换行分隔
            不要输出任何额外的解释、代码块包围或 Markdown 包裹，只输出纯 Markdown 内容本身
          prompt: |
            今天是 ${{ steps.fetch_data.outputs.today }}，
            以下是我 GitHub starred 仓库中，近7天有新版本发布的项目列表（JSON格式）：

            ${{ steps.fetch_data.outputs.releases }}

            请对列表中的 **每个项目** 都生成卡片，一个都不能少
            输出格式如下：

            ## 📅 ${{ steps.fetch_data.outputs.today }} 更新播报

            > 共发现 **${{ steps.fetch_data.outputs.count }}** 个 starred 项目有新版本

            ---

            ### [仓库全名](仓库URL) `版本号`
            - 📅 发布时间（北京时间）
            - 🔗 [查看 Release](release链接)
            - 📝 更新内容：
              - release body 中的每个要点单独一行，用 `- ` 开头
              - 保持原文语义分段，不要合并不同的要点
              - 如果 body 为空则写"无发布说明"

            （每个项目之间的空行分隔）

            如果列表为空，输出：
            ## 📅 ${{ steps.fetch_data.outputs.today }} 更新播报
            > 🎉 近7天 starred 项目无新版本发布，保持关注

      - name: Update README.md
        run: |
          python3 - <<'PYEOF'
          import re, os

          readme_path = "README.md"
          response_file = os.environ.get("RESPONSE_FILE", "")
          today = os.environ.get("TODAY", "")

          if response_file and os.path.exists(response_file):
              with open(response_file, "r", encoding="utf-8") as f:
                  ai_output = f.read()
          else:
              ai_output = "*(AI 未返回内容)*"

          with open(readme_path, "r", encoding="utf-8") as f:
              content = f.read()

          update_time = os.environ.get("UPDATE_TIME", today)
          content = re.sub(
              r'\*\*[^*]*\*\*\n\n<!-- STAR_FEED_START -->',
              f'**更新于 {update_time}**\n\n<!-- STAR_FEED_START -->',
              content
          )

          today_section = f"<!-- FEED:{today} -->\n{ai_output.strip()}\n<!-- /FEED:{today} -->"

          feed_block_match = re.search(
              r"<!-- STAR_FEED_START -->\n(.*?)\n<!-- STAR_FEED_END -->",
              content,
              re.DOTALL
          )

          existing_sections = {}
          if feed_block_match:
              inner = feed_block_match.group(1)
              for m in re.finditer(
                  r"<!-- FEED:(\d{4}-\d{2}-\d{2}) -->\n(.*?)\n<!-- /FEED:\1 -->",
                  inner,
                  re.DOTALL
              ):
                  existing_sections[m.group(1)] = m.group(0)

          count = os.environ.get("COUNT", "0")
          if count == "0" and today in existing_sections:
              print(f"ℹ️ count=0 且当日数据已存在，跳过覆盖")
          else:
              existing_sections[today] = today_section
          sorted_dates = sorted(existing_sections.keys(), reverse=True)[:7]
          new_inner = "\n\n".join(existing_sections[d] for d in sorted_dates)
          new_feed_block = f"<!-- STAR_FEED_START -->\n{new_inner}\n<!-- STAR_FEED_END -->"

          if feed_block_match:
              content = content[:feed_block_match.start()] + new_feed_block + content[feed_block_match.end():]
          else:
              print("⚠️ 未找到 STAR_FEED_START/END 标记，追加到末尾")
              content += "\n\n" + new_feed_block

          with open(readme_path, "w", encoding="utf-8") as f:
              f.write(content)

          print("✅ README.md 已更新")
          PYEOF
        env:
          RESPONSE_FILE: ${{ steps.ai_feed.outputs.response-file }}
          TODAY: ${{ steps.fetch_data.outputs.today }}
          UPDATE_TIME: ${{ steps.fetch_data.outputs.update_time }}
          COUNT: ${{ steps.fetch_data.outputs.count }}

      - name: Commit and push README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md

          if git diff --staged --quiet; then
            echo "ℹ️ README 无变化，跳过 commit"
          else
            git commit -m "⭐ Star Feed 更新 - ${{ steps.fetch_data.outputs.today }}"
            git push
            echo "✅ 已推送更新"
          fi
