name: Star Feed Update

on:
  schedule:
    - cron: "15 8 * * *"
      timezone: Asia/Shanghai
  workflow_dispatch:

jobs:
  update-star-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.FEED_GITHUB_TOKEN }}

      - name: Fetch starred repos
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.FEED_GITHUB_TOKEN }}
        run: |
          python scripts/fetch_repos.py > starred_data.json

          COUNT=$(jq -r '.count // 0' starred_data.json)
          echo "📦 starred 仓库：$COUNT 个"

          # 导出关键字段给后续步骤
          echo "date=$(jq -r '.date' starred_data.json)" >> $GITHUB_OUTPUT
          echo "fetch_time=$(jq -r '.fetch_time' starred_data.json)" >> $GITHUB_OUTPUT
          echo "starred_data=$(jq -c '{count, repos}' starred_data.json)" >> $GITHUB_OUTPUT

      - name: Generate feed via AI
        id: ai_feed
        uses: actions/ai-inference@v1
        with:
          endpoint: https://integrate.api.nvidia.com/v1
          token: ${{ secrets.NVIDIA_API_KEY }}
          model: z-ai/glm-5.1
          max-tokens: 131072
          system-prompt: |
            你是 GitHub 仓库更新播报员，负责将用户的 starred 仓库 release 动态整理成结构化 JSON。

            你的风格：专业、信息密度高、中文表达流畅。
            你了解大多数知名开源项目的更新动态，能根据 release body 提炼准确的更新摘要。

            核心规则：
            - 只输出纯 JSON，不含任何 Markdown 包裹、代码块或额外说明
            - 严格遵守输出的 JSON 结构，字段名不可更改
            - tag 直接用 release.tag，不要用语言类型代替
            - changes 根据 release.body 提炼，写具体的技术要点
          prompt: |
            以下是我的 GitHub starred 仓库列表，每个仓库已包含 `release` 字段：
            - release.tag：最新 release 的版本号
            - release.published_at：release 发布时间（北京时间）
            - release.html_url：release 页面 URL
            - release.body：release 内容摘要
            - release 为 null 表示该仓库无 release
            ${{ steps.fetch.outputs.starred_data }}

            请分析以上数据，输出以下 JSON 格式（严格遵循，只输出 JSON）：

            {
              "date": "2026-06-25",
              "items": [
                {
                  "repo": "owner/repo",
                  "url": "https://github.com/owner/repo",
                  "tag": "v1.2.3",
                  "release_url": "https://github.com/owner/repo/releases/tag/v1.2.3",
                  "release_date": "2026-06-25 00:44",
                  "changes": ["具体的更新说明"]
                }
              ]
            }

            要求：
            - 数据已预过滤，所有仓库都有 release 且在 7 天内，无需再按日期过滤
            - tag：直接用 release.tag
            - release_url：直接用 release.html_url
            - release_date：直接用 release.published_at
            - changes：根据 release.body 提炼具体的中文更新摘要。
              把 body 中的 Markdown 列表、标题等内容提炼为简洁的技术要点，
              至少写 2 条，可以更多。每条用一句话概括一个有意义的改动。
            - 按接收到的数据顺序直接输出即可，不要自行按 release_date 或其他字段重新排序
            - 如果 items 为空数组，直接输出空数组，不要自己编数据
            - 只输出纯 JSON，不要 markdown 包裹、不要额外说明

      - name: Update README.md
        run: python scripts/update_readme.py
        env:
          AI_OUTPUT_FILE: ${{ steps.ai_feed.outputs.response-file }}
          UPDATE_TIME: ${{ steps.fetch.outputs.fetch_time }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md

          if git diff --staged --quiet; then
            echo "ℹ️ README 无变化，跳过 commit"
          else
            git commit -m "⭐ Star Feed 更新 - $(TZ='Asia/Shanghai' date '+%Y-%m-%d')"
            git pull --rebase origin main
            git push
            echo "✅ 已推送更新"
          fi
