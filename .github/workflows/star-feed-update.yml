name: Star Feed Update

on:
  schedule:
    - cron: "15 8 * * *"
      timezone: Asia/Shanghai
  workflow_dispatch:

jobs:
  update-star-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.FEED_GITHUB_TOKEN }}

      - name: Fetch starred repos
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.FEED_GITHUB_TOKEN }}
        run: |
          python scripts/fetch_repos.py > starred_data.json

          COUNT=$(jq -r '.count // 0' starred_data.json)
          echo "📦 starred 仓库：$COUNT 个"

          # 导出关键字段给后续步骤
          echo "date=$(jq -r '.date' starred_data.json)" >> $GITHUB_OUTPUT
          echo "fetch_time=$(jq -r '.fetch_time' starred_data.json)" >> $GITHUB_OUTPUT
          echo "starred_data=$(jq -c '{count, repos}' starred_data.json)" >> $GITHUB_OUTPUT

      - name: Generate feed via AI
        id: ai_feed
        uses: actions/ai-inference@v1
        with:
          endpoint: https://integrate.api.nvidia.com/v1
          token: ${{ secrets.NVIDIA_API_KEY }}
          model: z-ai/glm-5.1
          max-tokens: 131072
          system-prompt: |
            你是 GitHub 仓库更新播报员，负责将用户的 starred 仓库动态整理成结构化 JSON。

            你的风格：专业、信息密度高、中文表达流畅。
            你了解大多数知名开源项目的更新动态，能根据仓库名和描述推断合理的更新内容。

            核心规则：
            - 只输出纯 JSON，不含任何 Markdown 包裹、代码块或额外说明
            - 严格遵守输出的 JSON 结构，字段名不可更改
            - tag 字段直接用数据中提供的值，不要用语言类型代替
            - changes 要写得具体、详细，不要泛泛而谈
          prompt: |
            以下是我的 GitHub starred 仓库列表，每个仓库已包含 `tag` 字段（latest release tag，可能为空字符串）：
            ${{ steps.fetch.outputs.starred_data }}

            请分析以上数据，输出以下 JSON 格式（严格遵循，只输出 JSON）：

            {
              "date": "2026-06-25",
              "items": [
                {
                  "repo": "owner/repo",
                  "url": "https://github.com/owner/repo",
                  "tag": "v1.2.3",
                  "release_url": "https://github.com/owner/repo",
                  "release_date": "2026-06-25 00:44",
                  "changes": ["具体的更新说明"]
                }
              ]
            }

            要求：
            - 只包含 pushed_at 在近 7 天内的仓库
            - tag：直接从数据中取 repo.tag 字段的值。
              有值就用它（版本号），没有值就留空字符串 ""（渲染时会自动隐藏）
            - release_url：用仓库 URL（实际 Release 链接不确定，用 repo URL 即可）
            - release_date：直接用数据中的 pushed 字段值（已转为北京时间，格式 YYYY-MM-DD HH:MM）
            - changes：生成具体、有信息量的中文更新摘要。
              根据仓库名、描述和语言推断本次更新的重点，至少写 2 条，可以更多。
              好例子：❌「优化性能」→ ✅「重构内存池分配器，高并发场景延迟降低 40%」
              好例子：❌「修复 bug」→ ✅「修复 WebSocket 连接在弱网环境下的自动重连失败问题」
            - 按 release_date 从最新到最旧排序
            - 如果近 7 天没有活跃仓库，items 为空数组
            - 只输出纯 JSON，不要 markdown 包裹、不要额外说明

      - name: Update README.md
        run: python scripts/update_readme.py
        env:
          AI_OUTPUT_FILE: ${{ steps.ai_feed.outputs.response-file }}
          UPDATE_TIME: ${{ steps.fetch.outputs.fetch_time }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md

          if git diff --staged --quiet; then
            echo "ℹ️ README 无变化，跳过 commit"
          else
            git commit -m "⭐ Star Feed 更新 - $(TZ='Asia/Shanghai' date '+%Y-%m-%d')"
            git pull --rebase origin main
            git push
            echo "✅ 已推送更新"
          fi
